services:
  mysql:
    image: mysql:8.0
    container_name: baseball_mysql_dev
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: baseball_game
      MYSQL_USER: gameuser
      MYSQL_PASSWORD: gamepassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    container_name: baseball_redis_dev
    ports:
      - "6379:6379"

volumes:
  mysql_dev_data: